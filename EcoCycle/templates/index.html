<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | EcoCycle™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #112211 0%, #2d6a4f 100%); overflow: hidden; font-family: 'Inter', sans-serif; }
        .tree { position: absolute; bottom: 20px; opacity: 0.2; pointer-events: none; animation: wind 5s ease-in-out infinite; }
        @keyframes wind { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg); } }
        .glass-login { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); z-index: 10; }
        
        /* DYNAMIC WAVES */
        .waves { position: absolute; bottom: 0; width: 100%; height: 15vh; min-height: 100px; max-height: 150px; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(255,255,255,0.3); }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(255,255,255,0.5); }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(255,255,255,0.2); }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        /* BUBBLES */
        .bubble { position: absolute; bottom: -20px; background: rgba(255,255,255,0.2); border-radius: 50%; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { bottom: -20px; transform: translateX(0); opacity: 1; } 100% { bottom: 100vh; transform: translateX(100px); opacity: 0; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">
    <div class="tree left-10 text-[200px]">🌲</div>
    <div class="tree right-10 text-[200px]">🌳</div>

    <!-- Dynamic Bubbles -->
    <div class="bubble" style="left:10%; width:40px; height:40px; animation-duration:8s;"></div>
    <div class="bubble" style="left:30%; width:20px; height:20px; animation-duration:12s; animation-delay:2s;"></div>
    <div class="bubble" style="left:70%; width:50px; height:50px; animation-duration:10s; animation-delay:4s;"></div>

    <svg class="waves" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" />
            <use xlink:href="#gentle-wave" x="48" y="3" />
            <use xlink:href="#gentle-wave" x="48" y="5" />
        </g>
    </svg>

    <div class="glass-login p-10 w-96 text-center border border-white/20">
        <h1 class="text-4xl font-black text-green-800 tracking-tighter mb-2">EcoCycle™</h1>
        <p class="text-green-700 font-bold mb-8 italic">One Small Step Today,<br>A Greener World Tomorrow.</p>
        <form action="/dashboard" method="GET" class="space-y-4">
            <input type="text" name="username" placeholder="Enter Your Name" class="w-full p-4 rounded-2xl bg-emerald-50 border border-green-200 focus:outline-none" required>
            <input type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-emerald-50 border border-green-200 focus:outline-none" required>
            <button type="submit" class="w-full bg-green-700 text-white font-black py-4 rounded-2xl hover:bg-green-800 shadow-lg">Enter the Ecosystem</button>
        </form>
    </div>
</body>
</html>
